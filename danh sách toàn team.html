        // ========== HELPER FUNCTIONS ==========
        function findVal(obj, keys) {
            if (!obj) return null;
            if (!Array.isArray(keys)) keys = [keys];
            const lowerKeys = keys.map(k => k.toLowerCase().trim());
            for (let k in obj) {
                if (lowerKeys.includes(k.toLowerCase().trim())) {
                    return obj[k];
                }
            }
            return null;
        }

        function parseDateSafe(dateInput) {
            if (!dateInput) return null;
            if (dateInput instanceof Date) return dateInput;
            const str = String(dateInput).trim();
            if (!str) return null;
            if (str.includes('-')) {
                const parts = str.split('-');
                if (parts.length === 3) {
                    const year = parseInt(parts[0]);
                    const month = parseInt(parts[1]);
                    const day = parseInt(parts[2]);
                    if (!isNaN(year) && !isNaN(month) && !isNaN(day)) {
                        return new Date(year, month - 1, day);
                    }
                }
            }
            if (str.includes('/')) {
                const parts = str.split('/');
                if (parts.length === 3) {
                    const month = parseInt(parts[0]);
                    const day = parseInt(parts[1]);
                    const year = parseInt(parts[2]);
                    if (!isNaN(day) && !isNaN(month) && !isNaN(year)) {
                        return new Date(year, month - 1, day);
                    }
                }
            }
            const d = new Date(str);
            return isNaN(d.getTime()) ? null : d;
        }

        function normalizeName(name) {
            if (!name) return '';
            return name.toString().trim().replace(/\s+/g, ' ').toLowerCase();
        }

        function parseMoney(moneyStr) {
            if (typeof moneyStr === 'number') return moneyStr;
            return parseInt(String(moneyStr || 0).replace(/\./g, '').replace(/,/g, '').replace(/\D/g, '')) || 0;
        }

        // Tuần đầu tiên bắt đầu từ thứ 2, 29/12/2025
        const FIRST_WEEK_START = new Date(2025, 11, 29); // 29/12/2025 (thứ 2)
        
        // Cache để lưu danh sách tuần đã tính toán
        let weekRangesCache = null;

        // Tự động tạo danh sách các tuần từ tuần đầu tiên đến tuần hiện tại + 4 tuần
        function generateWeekRanges() {
            if (weekRangesCache) return weekRangesCache;

            const now = new Date();
            const currentWeekRange = getWeekRange(now);
            const currentWeekStart = currentWeekRange.start;
            
            // Tính đến tuần hiện tại + 4 tuần trong tương lai
            const endDate = new Date(currentWeekStart);
            endDate.setDate(endDate.getDate() + (4 * 7)); // +4 tuần

            const weeks = [];
            let weekStart = new Date(FIRST_WEEK_START);
            let weekNum = 1;

            while (weekStart <= endDate) {
                const weekRange = getWeekRange(weekStart);
                weeks.push({
                    id: `w${weekNum}`,
                    date: new Date(weekStart),
                    range: weekRange
                });
                weekNum++;
                // Chuyển sang tuần tiếp theo (thêm 7 ngày)
                weekStart.setDate(weekStart.getDate() + 7);
            }

            weekRangesCache = weeks;
            return weeks;
        }

        function getCurrentWeek() {
            const now = new Date();
            now.setHours(0, 0, 0, 0);
            const currentWeekRange = getWeekRange(now);
            const currentWeekStart = currentWeekRange.start;
            
            const weeks = generateWeekRanges();
            for (let week of weeks) {
                if (currentWeekStart.getTime() === week.range.start.getTime()) {
                    return week.id;
                }
            }
            return 'w1';
        }

        function getWeekRange(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = day === 0 ? -6 : 1 - day;
            const monday = new Date(d);
            monday.setDate(d.getDate() + diff);
            monday.setHours(0, 0, 0, 0);
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            sunday.setHours(23, 59, 59, 999);
            return { start: monday, end: sunday };
        }

        function getDateRange(type, value) {
            let start, end;
            if (type === 'week') {
                const weeks = generateWeekRanges();
                const week = weeks.find(w => w.id === value);
                if (week) {
                    start = new Date(week.range.start);
                    end = new Date(week.range.end);
                } else {
                    // Fallback về tuần đầu tiên
                    const firstWeek = getWeekRange(FIRST_WEEK_START);
                    start = firstWeek.start;
                    end = firstWeek.end;
                }
                start.setHours(0, 0, 0, 0);
                end.setHours(23, 59, 59, 999);
            } else {
                let filterSettings = null;
                try {
                    const settingsStr = localStorage.getItem('filterSettings');
                    if (settingsStr) {
                        filterSettings = JSON.parse(settingsStr);
                    }
                } catch (e) { }
                const m = filterSettings ? filterSettings.month : new Date().getMonth() + 1;
                const y = filterSettings ? filterSettings.year : new Date().getFullYear();
                
                const now = new Date();
                const currentMonth = now.getMonth() + 1;
                const currentYear = now.getFullYear();
                
                // Nếu là tháng hiện tại, CHỈ tính tuần hiện tại (không tính từ đầu tháng)
                if (m === currentMonth && y === currentYear) {
                    const currentWeek = getCurrentWeek();
                    const weeks = generateWeekRanges();
                    const week = weeks.find(w => w.id === currentWeek);
                    
                    if (week) {
                        start = new Date(week.range.start); // Bắt đầu từ thứ 2 của tuần hiện tại
                        end = new Date(week.range.end); // Kết thúc vào chủ nhật của tuần hiện tại
                    } else {
                        // Fallback
                        const firstWeek = getWeekRange(FIRST_WEEK_START);
                        start = firstWeek.start;
                        end = firstWeek.end;
                    }
                    console.log(`[BXH TOÀN TEAM] Tháng hiện tại - CHỈ tính tuần hiện tại: ${start.toLocaleDateString('vi-VN')} đến ${end.toLocaleDateString('vi-VN')}`);
                } else {
                    // Nếu là tháng đã qua, tính hết tháng
                    start = new Date(y, m - 1, 1);
                    end = new Date(y, m, 0, 23, 59, 59);
                    console.log(`[BXH TOÀN TEAM] Tháng đã qua - tính hết tháng: ${start.toLocaleDateString('vi-VN')} đến ${end.toLocaleDateString('vi-VN')}`);
                }
            }
            return { start, end };
        }

        function checkIsCurrentPeriod(type, value) {
            const now = new Date();
            if (type === 'week') return value === getCurrentWeek();
            let filterSettings = null;
            try {
                const settingsStr = localStorage.getItem('filterSettings');
                if (settingsStr) {
                    filterSettings = JSON.parse(settingsStr);
                }
            } catch (e) { }
            const m = filterSettings ? filterSettings.month : new Date().getMonth() + 1;
            const y = filterSettings ? filterSettings.year : new Date().getFullYear();
            return (m === now.getMonth() + 1 && y === now.getFullYear());
        }

        const AVATAR_DATA_MAP = new Map();
        Object.keys(AVATAR_DATA).forEach(name => {
            AVATAR_DATA_MAP.set(normalizeName(name), AVATAR_DATA[name]);
        });

        let hrDataMap = null;

        function buildHRDataMap() {
            if (!hrData || hrData.length === 0) {
                hrDataMap = null;
                return;
            }
            hrDataMap = new Map();
            hrData.forEach(record => {
                const recordName = (record['Họ Và Tên'] || record['Tên'] || record['Name'] ||
                    record['Họ và tên'] || record['Họ_và_tên'] || '').toString().trim();
                if (recordName) {
                    const normalized = normalizeName(recordName);
                    if (!hrDataMap.has(normalized)) {
                        hrDataMap.set(normalized, record);
                    }
                }
            });
        }

        function extractGoogleDriveFileId(link) {
            if (!link) return null;
            const str = link.toString().trim();
            let m = str.match(/\/file\/d\/([a-zA-Z0-9_-]+)/); if (m) return m[1];
            m = str.match(/[?&]id=([a-zA-Z0-9_-]+)/); if (m) return m[1];
            m = str.match(/open[?&]id=([a-zA-Z0-9_-]+)/); if (m) return m[1];
            return null;
        }

        function convertGoogleDriveLink(link) {
            if (!link) return link;
            const fileId = extractGoogleDriveFileId(link);
            return fileId ? `https://drive.google.com/thumbnail?id=${fileId}&sz=w800` : link;
        }

        function getAvatar(name) {
            if (!name) {
                let hash = 0;
                return `https://i.pravatar.cc/150?img=${Math.abs(hash % 70)}`;
            }
            const nameTrim = name.trim();
            const nameNormalized = normalizeName(nameTrim);
            if (AVATAR_DATA_MAP.has(nameNormalized)) return AVATAR_DATA_MAP.get(nameNormalized);
            if (AVATAR_DATA[nameTrim]) return AVATAR_DATA[nameTrim];

            if (!hrDataMap && hrData && hrData.length > 0) buildHRDataMap();

            if (hrDataMap) {
                const hrRecord = hrDataMap.get(nameNormalized);
                if (hrRecord) {
                    let imageLink = hrRecord['Link ảnh'] || hrRecord['link ảnh'] || hrRecord['Link_ảnh'] ||
                        hrRecord['Link anh'] || hrRecord['link anh'] || hrRecord['Link_anh'] ||
                        hrRecord['Ảnh'] || hrRecord['anh'] || hrRecord['Image'] || hrRecord['image'] ||
                        hrRecord['Avatar'] || hrRecord['avatar'] || hrRecord['Ảnh đại diện'] ||
                        hrRecord['Anh dai dien'] || hrRecord['Anh_dai_dien'] ||
                        hrRecord['LINK ẢNH'] || hrRecord['LINK_ẢNH'];
                    if (!imageLink) {
                        imageLink = hrRecord['Link vận đơn'] || hrRecord['link vận đơn'] || hrRecord['Link_vận_đơn'] ||
                            hrRecord['Link van don'] || hrRecord['link van don'] || hrRecord['Link_van_don'] ||
                            hrRecord['Link vận đơn cũ'] || hrRecord['link vận đơn cũ'] || hrRecord['Link_vận_đơn_cũ'];
                    }
                    if (imageLink && imageLink.trim()) return convertGoogleDriveLink(imageLink.trim());
                }
            }
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return `https://i.pravatar.cc/150?img=${Math.abs(hash % 70)}`;
        }

        function getCurrentShift() {
            const h = new Date().getHours();
            return (h >= 7 && h < 19) ? 'Ca ngày' : 'Ca Đêm';
        }

        function isStaffInShift(name, shift) {
            if (!hrDataMap || !hrDataMap.has(normalizeName(name))) return true;
            const rec = hrDataMap.get(normalizeName(name));
            const ca = String(findVal(rec, ['Ca', 'Ca làm việc']) || '').toLowerCase();
            if (shift === 'Ca ngày') return ca.includes('ngày') || ca.includes('ngay');
            if (shift === 'Ca Đêm') return ca.includes('đêm') || ca.includes('dem');
            return true;
        }

        // Hàm helper để rút gọn tên
        function abbreviateName(fullName) {
            if (!fullName) return "";
            const parts = fullName.trim().split(/\s+/);
            if (parts.length === 1) return parts[0];
            const firstName = parts[parts.length - 1];
            const others = parts.slice(0, parts.length - 1);
            const initials = others.map(part => part.charAt(0).toUpperCase()).join('');
            return `${firstName}-${initials}`;
        }

                            <div style="font-weight: 600; color: #007bff;">Tỉ lệ chốt: ${item.closeRate}</div>

                } else if (!isSale && item.displayRate) {
                    metricsHtml = `
                        <div style="font-size: 0.65vw; color: #666; margin-top: 0.2vh; line-height: 1.4;">
                            <div style="font-weight: 600; color: #ff6b6b;">ADS: ${item.displayRate}</div>
                            <div style="font-size: 0.6vw; color: #28a745;">DS: ${formatMoney(item.doanhthu || item.rawVal || 0)}</div>
                            <div style="font-size: 0.6vw; color: #dc3545;">CPQC: ${formatMoney(item.cpqc || 0)}</div>
                        </div>`;
                }

                html += `
                <div class="rank-item ${topClass}">
                    <div class="rank-pos ${rank <= 3 ? 'rank-' + rank : ''}">#${rank}</div>
                    <div class="user-info-group">
                        <div style="position:relative;">${crown}<img src="${item.avatar || 'https://via.placeholder.com/50'}" class="avatar" onerror="this.src='https://via.placeholder.com/50'"></div>

                </div>`;

            container.innerHTML = html;
            
            // Animate bars sau khi render
            setTimeout(() => {
                container.querySelectorAll('.bar-fill').forEach(bar => {
                    bar.style.width = bar.getAttribute('data-width');
                });

        }

        // Hàm format tiền
        function formatMoney(num) {
            if (!num) return '0';
            if (num >= 1000000) return Math.round(num / 1000000) + ' Tr';
            return Math.round(num).toLocaleString('vi-VN');
        }

        // ========== LOAD DATA ==========
        async function loadData() {
            try {
                console.log('[BXH TOÀN TEAM] 🔄 Bắt đầu load dữ liệu từ API...');
                const [resF3, resReport, resMkt, resHr] = await Promise.all([

                    fetch(REPORT_URL).catch((e) => { console.error('[BXH TOÀN TEAM] ❌ Lỗi fetch Report:', e); return null; }),
                    fetch(MKT_REPORT_URL).catch((e) => { console.error('[BXH TOÀN TEAM] ❌ Lỗi fetch MKT Report:', e); return null; }),
                    fetch(HR_URL + '.json').catch((e) => { console.error('[BXH TOÀN TEAM] ❌ Lỗi fetch HR:', e); return null; })
                ]);

                if (resF3 && resF3.ok) {
                    const json = await resF3.json();
                    if (json.success && Array.isArray(json.data)) {
                        allOrders = json.data;
                    } else if (Array.isArray(json)) {
                        allOrders = json;
                    } else {
                        allOrders = Object.values(json.data || json);
                    }
                    console.log('[BXH TOÀN TEAM] ✅ Loaded orders:', allOrders.length);
                    if (allOrders.length > 0) {
                        console.log('[BXH TOÀN TEAM] 📋 Sample order:', {
                            keys: Object.keys(allOrders[0]),
                            date: findVal(allOrders[0], ["Ngày lên đơn", "Ngày_lên_đơn", "Date"]),
                            team: findVal(allOrders[0], ["Team", "TEAM", "Bộ phận"]),
                            sale: findVal(allOrders[0], ["Nhân_viên_Sale", "Nhân viên Sale", "Sale"]),
                            mkt: findVal(allOrders[0], ["Nhân_viên_Marketing", "Nhân viên Marketing", "MKT"])
                        });
                    }
                } else {
                    console.warn('[BXH TOÀN TEAM] ⚠️ F3 API không trả về dữ liệu hoặc có lỗi:', resF3 ? resF3.status : 'no response');
                }

                if (resReport && resReport.ok) {
                    const json = await resReport.json();
                    salesReportData = Array.isArray(json) ? json : (json.data || []);
                    console.log('[BXH TOÀN TEAM] ✅ Loaded sales report:', salesReportData.length);
                } else {
                    console.warn('[BXH TOÀN TEAM] ⚠️ Sales Report API không trả về dữ liệu:', resReport ? resReport.status : 'no response');
                }
                
                if (resMkt && resMkt.ok) {
                    const json = await resMkt.json();
                    mktReportData = Array.isArray(json) ? json : (json.data || []);
                    console.log('[BXH TOÀN TEAM] ✅ Loaded MKT report:', mktReportData.length);
                } else {
                    console.warn('[BXH TOÀN TEAM] ⚠️ MKT Report API không trả về dữ liệu:', resMkt ? resMkt.status : 'no response');
                }
                
                if (resHr && resHr.ok) {
                    const data = await resHr.json();
                    hrData = Array.isArray(data) ? data : Object.values(data);
                    console.log('[BXH TOÀN TEAM] ✅ Loaded HR data:', hrData.length);
                    // Build HR data map ngay sau khi load
                    if (hrData.length > 0) {
                        buildHRDataMap();

                } else {
                    console.warn('[BXH TOÀN TEAM] ⚠️ HR API không trả về dữ liệu:', resHr ? resHr.status : 'no response');
                }

                if (allOrders.length === 0) {
                    console.error('[BXH TOÀN TEAM] ❌ KHÔNG CÓ DỮ LIỆU ĐƠN HÀNG! Vui lòng kiểm tra API.');

                console.log('[BXH TOÀN TEAM] ✅ Hoàn thành load dữ liệu');
                
                // Chỉ gọi updateData() nếu đây là lần load đầu tiên (không phải từ pending update)
                if (!pendingUpdate) {
                    updateData();

                console.error('[BXH TOÀN TEAM] ❌ Error stack:', e.stack);

                updateData();

        // ========== CALCULATE STATS ==========
        function calculateStats(startDate, endDate, filterCancelled, isCurrentPeriod = false) {
            console.log(`[BXH TOÀN TEAM] 📊 Tính toán stats từ ${startDate.toLocaleDateString('vi-VN')} đến ${endDate.toLocaleDateString('vi-VN')}`);
            console.log(`[BXH TOÀN TEAM] 📦 Tổng số đơn hàng trong database: ${allOrders.length}`);
            
            let debugStats = {
                totalOrders: allOrders.length,
                hasDate: 0,
                inTeam: 0,
                inDateRange: 0,
                passedStatus: 0,
                final: 0
            };
            
            const periodOrders = allOrders.filter(o => {
                const rawDate = findVal(o, ["Ngày lên đơn", "Ngày_lên_đơn", "Ngay len don", "Date"]);
                const d = parseDateSafe(rawDate);
                if (!d) return false;
                debugStats.hasDate++;

                const team = String(findVal(o, ["Team", "TEAM", "Bộ phận"]) || "").toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                const hasHanoi = team.includes("ha noi") || team.includes("hanoi") || team.includes("hn");
                if (!hasHanoi) return false;
                debugStats.inTeam++;

                if (d < startDate || d > endDate) return false;
                debugStats.inDateRange++;

                if (filterCancelled) {
                    const status = String(findVal(o, ["Kết quả Check", "Kết_quả_Check", "Ket_qua_Check", "Status"]) || "").trim().toLowerCase();
                    if (status !== "ok") return false;
                }
                debugStats.passedStatus++;

                return true;
            });
            
            debugStats.final = periodOrders.length;
            console.log(`[BXH TOÀN TEAM] 🔍 Debug Stats:`, debugStats);
            console.log(`[BXH TOÀN TEAM] 📦 Tổng số đơn hàng trong khoảng thời gian: ${periodOrders.length}`);

            const saleMap = {};
            const mktMap = {};
            const saleOrderCount = {};
            let ordersWithSale = 0;
            let ordersWithMkt = 0;

            periodOrders.forEach(o => {
                const money = parseMoney(findVal(o, ["Tổng tiền VNĐ", "Tổng_tiền_VNĐ", "Total"]));

                const saleName = String(findVal(o, ["Nhân_viên_Sale", "Nhân viên Sale", "Sale"]) || "").trim();
                if (saleName) {
                    if (!saleMap[saleName]) saleMap[saleName] = 0;
                    if (!saleOrderCount[saleName]) saleOrderCount[saleName] = 0;
                    saleMap[saleName] += money;
                    saleOrderCount[saleName] += 1;
                    ordersWithSale++;
                }

                const mktName = String(findVal(o, ["Nhân_viên_Marketing", "Nhân viên Marketing", "MKT"]) || "").trim();
                if (mktName) {
                    if (!mktMap[mktName]) mktMap[mktName] = 0;
                    mktMap[mktName] += money;
                    ordersWithMkt++;
                }
            });
            
            console.log(`[BXH TOÀN TEAM] 👥 Đơn hàng có Sale: ${ordersWithSale}, Đơn hàng có MKT: ${ordersWithMkt}`);
            console.log(`[BXH TOÀN TEAM] 👥 saleMap keys: ${Object.keys(saleMap).length}, mktMap keys: ${Object.keys(mktMap).length}`);
            
            if (Object.keys(saleMap).length === 0 && ordersWithSale > 0) {
                console.warn(`[BXH TOÀN TEAM] ⚠️ Có ${ordersWithSale} đơn hàng có Sale nhưng saleMap rỗng!`);
            }
            if (Object.keys(mktMap).length === 0 && ordersWithMkt > 0) {
                console.warn(`[BXH TOÀN TEAM] ⚠️ Có ${ordersWithMkt} đơn hàng có MKT nhưng mktMap rỗng!`);
            }

            const EXCLUDED = ['Mai Thị Lý', 'Phạm Hải Yến', 'Trần Thị Nhung', 'Lê Ngọc Đài Trang', 'Đinh Thị Hoài Thư', 'Đỗ Thị Thu Hằng', 'Đinh Văn Khải', 'Lê Trung Hiếu', 'page-MCN', 'Phan Thị Chiến', 'Dương Thị Hạnh', 'Nguyễn Văn Hoàng'];
            const aggressiveFilter = (i) => {
                const n = i.name.toLowerCase();
                return !EXCLUDED.includes(i.name) && !n.includes('lumi') && !n.includes('page') && !n.includes('mcn');
            };

            let saleList = Object.keys(saleMap).map(name => ({
                name, rawVal: saleMap[name], value: formatMoney(saleMap[name]), avatar: getAvatar(name)
            })).sort((a, b) => b.rawVal - a.rawVal).filter(aggressiveFilter);

            // LỌC SALE THEO CA LÀM VIỆC (NGÀY: 7h-19h, ĐÊM: 19h-7h)
            if (!hrDataMap && hrData && hrData.length > 0) buildHRDataMap();
            const currentShift = getCurrentShift();
            console.log(`[BXH TOÀN TEAM] [SHIFT FILTER] Current shift: ${currentShift} (${new Date().getHours()}:00)`);
            const beforeShiftFilter = saleList.length;
            saleList = saleList.filter(i => isStaffInShift(i.name, currentShift));
            console.log(`[BXH TOÀN TEAM] [SHIFT FILTER] Sale personnel: ${beforeShiftFilter} → ${saleList.length} (filtered by shift)`);

            if (saleList.length > 0) {
                const max = saleList[0].rawVal;
                saleList.forEach(i => i.percent = max > 0 ? (i.rawVal / max) * 100 : 0);
            }

            let mktList = Object.keys(mktMap).map(name => ({
                name, rawVal: mktMap[name], value: formatMoney(mktMap[name]), avatar: getAvatar(name)
            })).sort((a, b) => b.rawVal - a.rawVal).filter(aggressiveFilter);

            if (mktList.length > 0) {
                const max = mktList[0].rawVal;
                mktList.forEach(i => i.percent = max > 0 ? (i.rawVal / max) * 100 : 0);
            }

            // Tính toán Số mess, Số đơn, Tỉ lệ chốt cho Sale
            saleList.forEach(item => {
                const reports = salesReportData.filter(r => {
                    const rName = String(findVal(r, ["Tên", "Ten", "Name", "Họ và tên"]) || "").trim();
                    if (normalizeName(rName) !== normalizeName(item.name)) return false;
                    const rDate = parseDateSafe(findVal(r, ["Ngày", "Ngay", "Date"]));
                    if (!rDate) return true;
                    return rDate >= startDate && rDate <= endDate;
                });

                let totalMess = 0;
                reports.forEach(r => {
                    totalMess += Number(findVal(r, ["Số Mess", "Số Mess Cmt", "Mess", "So Mess"]) || 0);
                });

                item.totalMess = totalMess;
                item.totalOrders = saleOrderCount[item.name] || 0;
                item.closeRate = totalMess > 0 ? ((item.totalOrders / totalMess) * 100).toFixed(1) + "%" : "0%";
                item.doanhthu = item.rawVal;
            });

            // Tính toán CPQC và ADS Rate cho MKT
            mktList.forEach(item => {
                const reports = mktReportData.filter(r => {
                    const rName = String(findVal(r, ["Tên", "Ten", "Name", "Họ và tên"]) || "").trim();
                    if (normalizeName(rName) !== normalizeName(item.name)) return false;
                    const rDate = parseDateSafe(findVal(r, ["Ngày", "Ngay", "Date"]));
                    if (!rDate) return true;
                    return rDate >= startDate && rDate <= endDate;
                });

                let totalCPQC = 0;
                reports.forEach(r => {
                    const ca = String(findVal(r, ["ca", "Ca", "CA", "Ca làm việc"]) || "").trim().toLowerCase();
                    if (ca === "hết ca" || ca === "het ca") {
                        totalCPQC += parseMoney(findVal(r, ["CPQC", "cpqc", "Chi phí QC", "ADS", "ads"]) || 0);
                    }
                });

                item.cpqc = totalCPQC;
                item.doanhthu = item.rawVal;
                item.adsRate = item.doanhthu > 0 ? (totalCPQC / item.doanhthu) * 100 : 0;
                item.displayRate = item.adsRate.toFixed(1) + "%";
            });

            // Tính lại percent
            if (saleList.length > 0) {
                const maxSale = saleList[0].rawVal;
                saleList.forEach(i => i.percent = maxSale > 0 ? (i.rawVal / maxSale) * 100 : 0);
            }
            if (mktList.length > 0) {
                const maxMkt = mktList[0].rawVal;
                mktList.forEach(i => i.percent = maxMkt > 0 ? (i.rawVal / maxMkt) * 100 : 0);
            }

            console.log(`[BXH TOÀN TEAM] 📊 Tính toán xong: Sale=${saleList.length}, MKT=${mktList.length}`);

            return {
                saleList,
                mktList
            };
        }

        // ========== UPDATE DATA ==========
        let isDataLoading = false;
        let pendingUpdate = false;
        
        function updateData() {
            console.log('[BXH TOÀN TEAM] 🔄 ========== BẮT ĐẦU CẬP NHẬT DỮ LIỆU ==========');
            
            // Kiểm tra xem dữ liệu đã được load chưa
            if (allOrders.length === 0) {
                if (!isDataLoading) {
                    console.warn('[BXH TOÀN TEAM] ⚠️ Dữ liệu chưa được load, đang load...');
                    pendingUpdate = true;
                    isDataLoading = true;
                    loadData().then(() => {
                        isDataLoading = false;
                        if (pendingUpdate) {
                            pendingUpdate = false;
                            console.log('[BXH TOÀN TEAM] ✅ Dữ liệu đã load xong, tiếp tục cập nhật...');
                            updateData();
                        }
                    }).catch(() => {
                        isDataLoading = false;
                        pendingUpdate = false;
                    });
                } else {
                    console.log('[BXH TOÀN TEAM] ⏳ Dữ liệu đang được load, đánh dấu cần cập nhật sau...');
                    pendingUpdate = true;
                }
                return;
            }
            
            // ĐỌC FILTER SETTINGS MỚI NHẤT TỪ LOCALSTORAGE
            let filterSettings = null;
            try {
                const settingsStr = localStorage.getItem('filterSettings');
                if (settingsStr) {
                    filterSettings = JSON.parse(settingsStr);
                    console.log('[BXH TOÀN TEAM] 📋 Filter settings đọc được:', filterSettings);
                } else {
                    console.warn('[BXH TOÀN TEAM] ⚠️ Không có filter settings trong localStorage, dùng mặc định');
                    // Tạo filter settings mặc định
                    filterSettings = {
                        periodType: 'week',
                        periodValue: getCurrentWeek(),
                        month: new Date().getMonth() + 1,
                        year: new Date().getFullYear()
                    };
                    localStorage.setItem('filterSettings', JSON.stringify(filterSettings));
                }
            } catch (e) {
                console.error('[BXH TOÀN TEAM] ❌ Lỗi đọc filter settings:', e);
                // Fallback về mặc định
                filterSettings = {
                    periodType: 'week',
                    periodValue: getCurrentWeek(),
                    month: new Date().getMonth() + 1,
                    year: new Date().getFullYear()
                };
            }

            const type = filterSettings.periodType || 'week';
            const weekValue = filterSettings.periodValue || getCurrentWeek();
            const isCurrentPeriod = checkIsCurrentPeriod(type, weekValue);
            
            console.log('[BXH TOÀN TEAM] 📊 Filter được sử dụng:', {
                type: type,
                weekValue: weekValue,
                month: filterSettings.month,
                year: filterSettings.year,
                isCurrentPeriod: isCurrentPeriod
            });

            const { start, end } = getDateRange(type, weekValue);
            const daysDiff = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
            console.log('[BXH TOÀN TEAM] 📅 Khoảng thời gian được tính toán:', {
                start: start.toLocaleDateString('vi-VN'),
                end: end.toLocaleDateString('vi-VN'),
                startTime: start.getTime(),
                endTime: end.getTime(),
                daysDiff: daysDiff
            });
            
            const shouldFilterStatus = (type === 'month') || (type === 'week' && !isCurrentPeriod);
            console.log('[BXH TOÀN TEAM] 🔍 Tham số tính toán:', {
                shouldFilterStatus: shouldFilterStatus,
                isCurrentPeriod: isCurrentPeriod,
                filterType: type
            });
            
            const stats = calculateStats(start, end, shouldFilterStatus, isCurrentPeriod);

            // Cập nhật hiển thị thời gian
            updateTimeRangeDisplay(null);

            // Render dữ liệu
            renderTeamList('team-sale-list', stats.saleList || [], true);
            renderTeamList('team-mkt-list', stats.mktList || [], false);

            console.log('[BXH TOÀN TEAM] ✅ ========== HOÀN THÀNH CẬP NHẬT DỮ LIỆU ==========');
            console.log('[BXH TOÀN TEAM] ✅ Kết quả:', {
                saleCount: (stats.saleList || []).length,
                mktCount: (stats.mktList || []).length,
                filterUsed: { type, weekValue, month: filterSettings.month, year: filterSettings.year }
            });
        }

        // Hàm cập nhật hiển thị khoảng thời gian - LUÔN LẤY TỪ FILTER SETTINGS
        function updateTimeRangeDisplay(teamListData) {
            const timeRangeText = document.getElementById('time-range-text');
            if (!timeRangeText) return;

            // LUÔN đọc từ filterSettings để đảm bảo hiển thị đúng theo filter hiện tại
            let displayText = '';
            let start, end;
            
            try {
                const filterSettingsStr = localStorage.getItem('filterSettings');
                if (!filterSettingsStr) {
                    displayText = 'Tuần hiện tại';
                    timeRangeText.textContent = displayText;
                    return;
                }

                const filterSettings = JSON.parse(filterSettingsStr);
                const type = filterSettings.periodType || 'week';
                const value = filterSettings.periodValue || '';
                
                if (type === 'week') {
                    // Tính toán khoảng thời gian thực tế từ filter
                    const weeks = generateWeekRanges();
                    const week = weeks.find(w => w.id === value);
                    
                    if (week) {
                        start = new Date(week.range.start);
                        end = new Date(week.range.end);
                    } else {
                        // Fallback
                        const firstWeek = getWeekRange(FIRST_WEEK_START);
                        start = firstWeek.start;
                        end = firstWeek.end;
                    }
                    
                    const weekNum = value.replace('w', '');
                    const startStr = `${start.getDate()}/${start.getMonth() + 1}/${start.getFullYear()}`;
                    const endStr = `${end.getDate()}/${end.getMonth() + 1}/${end.getFullYear()}`;
                    const daysDiff = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
                    displayText = `Tuần ${weekNum} (${startStr} - ${endStr}) - ${daysDiff} ngày`;
                } else if (type === 'month') {
                    const m = filterSettings.month || new Date().getMonth() + 1;
                    const y = filterSettings.year || new Date().getFullYear();
                    start = new Date(y, m - 1, 1);
                    end = new Date(y, m, 0, 23, 59, 59);
                    const startStr = `${start.getDate()}/${start.getMonth() + 1}/${start.getFullYear()}`;
                    const endStr = `${end.getDate()}/${end.getMonth() + 1}/${end.getFullYear()}`;
                    const daysDiff = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
                    displayText = `Tháng ${m}/${y} (${startStr} - ${endStr}) - ${daysDiff} ngày`;
                } else {
                    displayText = 'Tuần hiện tại';
                }
            } catch (e) {
                console.error('[BXH TOÀN TEAM] Lỗi đọc filter settings:', e);
                displayText = 'Tuần hiện tại';
            }

            timeRangeText.textContent = displayText;
        }

        // Load dữ liệu khi trang load
        // Hiển thị thời gian ngay khi trang load (không cần đợi dữ liệu)
        updateTimeRangeDisplay(null);
        loadData();

        // Lắng nghe thay đổi filter settings
        window.addEventListener('storage', function(e) {
            if (e.key === 'filterSettings') {
                console.log('[BXH TOÀN TEAM] 📨 Filter settings đã thay đổi (storage event), cập nhật hiển thị và tính toán lại dữ liệu...');
                // Cập nhật hiển thị thời gian ngay lập tức
                updateTimeRangeDisplay(null);
                // Tính toán lại dữ liệu
                updateData();
            }
        });
        
        // Lắng nghe message từ parent (index.html)
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'filterChanged') {
                console.log('[BXH TOÀN TEAM] 📨 Nhận message filterChanged từ parent, cập nhật hiển thị và tính toán lại dữ liệu...');
                // Cập nhật hiển thị thời gian ngay lập tức
                updateTimeRangeDisplay(null);
                // Tính toán lại dữ liệu
                updateData();
            }
        });

        // Lắng nghe postMessage từ parent window
        window.addEventListener('message', function(event) {
            // Lắng nghe thay đổi filter từ parent
            if (event.data && event.data.type === 'filterChanged') {
                console.log('[BXH TOÀN TEAM] 📨 Nhận thông báo filter đã thay đổi, tính toán lại dữ liệu...');
                updateData();
            }
        });

        // Polling để kiểm tra thay đổi filter settings (backup mechanism)
        let lastFilterHash = '';
        setInterval(() => {
            try {
                const currentFilter = localStorage.getItem('filterSettings');
                if (currentFilter && currentFilter !== lastFilterHash) {
                    lastFilterHash = currentFilter;
                    console.log('[BXH TOÀN TEAM] 📨 Phát hiện thay đổi filter qua polling, cập nhật hiển thị và tính toán lại dữ liệu...');
                    try {
                        const filterSettings = JSON.parse(currentFilter);
                        console.log('[BXH TOÀN TEAM] 📋 Filter mới từ localStorage:', filterSettings);
                    } catch (e) {}
                    // Cập nhật hiển thị thời gian ngay lập tức
                    updateTimeRangeDisplay(null);
                    // Đảm bảo dữ liệu đã load xong trước khi update
                    if (allOrders.length > 0) {
                        updateData();
                    } else {
                        console.log('[BXH TOÀN TEAM] ⏳ Dữ liệu chưa load xong, đợi load xong rồi mới update');
                    }
                }
            } catch (e) {
                console.error('[BXH TOÀN TEAM] Lỗi kiểm tra localStorage:', e);
            }
        }, 300); // Kiểm tra mỗi 0.3 giây để phản hồi nhanh hơn
    </script>
